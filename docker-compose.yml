services:
  # PostgreSQL Database - Shared between TeachersHub and ENEM services
  postgres:
    image: postgres:16
    container_name: teachershub-enem-postgres
    environment:
      POSTGRES_DB: teachershub_enem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/complete-init.sql:/docker-entrypoint-initdb.d/99-enem-legacy.sql
    ports:
      - "5433:5432"  # Porta externa 5433 para evitar conflito com TeachersHub (5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teachershub_enem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - teachershub-enem-network

  # Redis Cache - Shared for embeddings and session cache
  redis:
    image: redis:7-alpine
    container_name: teachershub-enem-redis
    ports:
      - "6380:6379"  # Porta externa 6380 para evitar conflito com TeachersHub (6379)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - teachershub-enem-network

  # ENEM RAG API - Python FastAPI service
  enem-rag-api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: teachershub-enem-rag-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/teachershub_enem
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: teachershub_enem
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      FASTAPI_ENV: development
      LOG_LEVEL: DEBUG
      MAX_QUESTIONS_PER_REQUEST: 50
    ports:
      - "8001:8000"  # Porta externa 8001 para acesso à API
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app  # Mount da API para desenvolvimento
      - enem_logs:/app/logs
    networks:
      - teachershub-enem-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  teachershub_logs:
    driver: local
  enem_logs:
    driver: local
  embeddings_cache:
    driver: local

networks:
  teachershub-enem-network:
    driver: bridge
    name: teachershub-enem-network
    ipam:
      config:
        - subnet: 172.21.0.0/16  # Subnet diferente para evitar conflito (TeachersHub usa 172.18.0.0/16)
