services:
  # PostgreSQL Database - Shared between TeachersHub and ENEM services
  postgres:
    image: postgres:16
    container_name: teachershub-enem-postgres
    environment:
      POSTGRES_DB: teachershub_enem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/database/init:/docker-entrypoint-initdb.d
      - ./database/complete-init.sql:/docker-entrypoint-initdb.d/99-enem-legacy.sql
    ports:
      - "5433:5432"  # Porta externa 5433 para evitar conflito com TeachersHub (5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teachershub_enem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - teachershub-enem-network

  # Redis Cache - Shared for embeddings and session cache
  redis:
    image: redis:7-alpine
    container_name: teachershub-enem-redis
    ports:
      - "6380:6379"  # Porta externa 6380 para evitar conflito com TeachersHub (6379)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - teachershub-enem-network

  # TeachersHub .NET API - Main orchestrator
  teachershub-api:
    build: 
      context: ./teachershub-integration
      dockerfile: shared/docker/Dockerfile.teachershub
    container_name: teachershub-enem-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=teachershub_enem;Username=teachershub_app;Password=teachershub123"
      ConnectionStrings__EnemConnection: "Host=postgres;Port=5432;Database=teachershub_enem;Username=enem_rag_service;Password=enem123"
      Redis__ConnectionString: "redis:6379"
      EnemServices__RagServiceUrl: "http://enem-rag-service:8000"
      JWT__SecretKey: "TeachersHub-ENEM-Integration-Secret-Key-2024"
      JWT__Issuer: "TeachersHub.ENEM.Api"
      JWT__Audience: "TeachersHub.ENEM.Client"
    ports:
      - "5001:5000"  # Porta externa 5001 para evitar conflito com TeachersHub Monitor (5000)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./teachershub-integration:/app/src
      - teachershub_logs:/app/logs
    networks:
      - teachershub-enem-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ENEM RAG API - Python FastAPI service
  enem-rag-api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: teachershub-enem-rag-api
    environment:
      DATABASE_URL: postgresql://enem_rag_service:enem123@postgres:5432/teachershub_enem
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: teachershub_enem
      DB_USER: enem_rag_service
      DB_PASSWORD: enem123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      FASTAPI_ENV: development
      LOG_LEVEL: DEBUG
      MAX_QUESTIONS_PER_REQUEST: 50
    ports:
      - "8001:8000"  # Porta externa 8001 para acesso à API
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app  # Mount da API para desenvolvimento
      - enem_logs:/app/logs
    networks:
      - teachershub-enem-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  teachershub_logs:
    driver: local
  enem_logs:
    driver: local
  embeddings_cache:
    driver: local

networks:
  teachershub-enem-network:
    driver: bridge
    name: teachershub-enem-network
    ipam:
      config:
        - subnet: 172.21.0.0/16  # Subnet diferente para evitar conflito (TeachersHub usa 172.18.0.0/16)
