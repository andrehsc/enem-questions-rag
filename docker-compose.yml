services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: enem-postgres
    environment:
      POSTGRES_DB: enem_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/complete-init.sql:/docker-entrypoint-initdb.d/01-complete-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enem_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enem-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: enem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - enem-network

  # ENEM Questions API
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: enem-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: enem_rag
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    networks:
      - enem-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  enem-network:
    driver: bridge
